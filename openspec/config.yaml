# openspec/config.yaml
schema: spec-driven

context: |
  Project: DashboardTrading — Trade Intelligence Platform (TIP)
  Stack: Python, FastAPI, React (frontend), SQLite
  Architecture: Offline-first, modular, scalable
  Status: Greenfield — no source code yet
  Testing: No test runner configured yet (strict_tdd: false)
  Style: No linter or formatter configured yet

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
